name: Build WebhookReforge

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            output: webhook-reforge-linux-amd64
          - os: windows-latest
            output: webhook-reforge-windows-amd64.exe
          - os: macos-latest
            output: webhook-reforge-macos-amd64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            wails build -o webhook-reforge-linux-amd64 -tags webkit2_41
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            wails build -o webhook-reforge
            cd build/bin
            zip -r ../../webhook-reforge-macos-amd64.zip webhook-reforge.app
            cd ../..
            # Move zip to build/bin so upload path is consistent
            mkdir -p build/bin
            mv webhook-reforge-macos-amd64.zip build/bin/
          else
            wails build -o ${{ matrix.output }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/bin/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '**/*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
